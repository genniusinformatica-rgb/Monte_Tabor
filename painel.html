<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel de Cadastros - 1º Acampamento de Servos</title>
<style>
    body {
        font-family: 'Segoe UI', Arial, sans-serif;
        background: #0a0a0a;
        color: #e2e8f0;
        margin: 0;
        padding: 20px;
    }
    h1 {
        color: #facc15;
        text-align: center;
        margin-bottom: 25px;
    }
    .topo {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-bottom: 25px;
        justify-content: center;
        align-items: center;
    }
    input[type="text"], select {
        padding: 12px 16px;
        border-radius: 8px;
        border: none;
        background: #1f1f1f;
        color: white;
        font-size: 1rem;
        min-width: 200px;
    }
    button {
        padding: 12px 20px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
        font-size: 1rem;
    }
    .btn-limpar { background: #4b5563; color: white; }
    .btn-atualizar { background: #22c55e; color: black; }
    .btn-relatorio { background: #eab308; color: black; }

    table {
        width: 100%;
        border-collapse: collapse;
        background: #1a1a1a;
        margin-top: 10px;
    }
    th, td {
        border: 1px solid #444;
        padding: 12px 10px;
        text-align: left;
    }
    th {
        background: #2a2a2a;
        color: #facc15;
        position: sticky;
        top: 0;
        z-index: 10;
    }
    tr:nth-child(even) { background: #222; }
    tr:hover { background: #333; }
</style>
</head>
<body>

<h1>Painel de Cadastros - 1º Acampamento de Servos</h1>

<div class="topo">
    <input type="text" id="busca" placeholder="🔍 Busca geral...">
    <select id="filtroSexo">
        <option value="">Todos os sexos</option>
    </select>
    <select id="filtroCidade">
        <option value="">Todas as cidades</option>
    </select>
    <button class="btn-limpar" onclick="limparFiltros()">🧹 Limpar</button>
    <button class="btn-atualizar" onclick="atualizar()">🔄 Atualizar</button>
    <button class="btn-relatorio" onclick="imprimir()">🖨 Relatório</button>
</div>

<table id="tabela"></table>

<script>
const URL = "https://script.google.com/macros/s/AKfycbyoYf4jnMG1-TCVK4ynfzwSBnBXQpJTlRvJL7GKDnjsWkQVGiPzCqTzdmlTD2PHXCqy/exec";  
// ← Cole aqui seu link atualizado da implantação, se necessário

let todosDados = [];
let headers = [];

// Carregar dados da planilha
function carregarDados() {
    fetch(URL)
        .then(res => res.text())
        .then(texto => {
            if (!texto || texto.trim() === "") {
                alert("Nenhum dado encontrado na planilha.");
                return;
            }

            const linhas = texto.trim().split("\n");
            todosDados = linhas.map(l => l.split("\t"));
            headers = todosDados[0] || [];

            popularFiltros();
            mostrarTabela(todosDados);
        })
        .catch(() => {
            alert("Erro ao carregar os dados.\nVerifique se a implantação está como 'Qualquer pessoa'.");
        });
}

function atualizar() {
    carregarDados();
}

// Popular filtros (Sexo e Cidade) de forma inteligente
function popularFiltros() {
    // Filtro de Sexo
    const idxSexo = headers.findIndex(h => String(h).toLowerCase().includes("sexo"));
    const selSexo = document.getElementById("filtroSexo");
    selSexo.innerHTML = '<option value="">Todos os sexos</option>';

    if (idxSexo !== -1) {
        const sexos = new Set();
        for (let i = 1; i < todosDados.length; i++) {
            const valor = todosDados[i][idxSexo];
            if (valor && valor.trim() !== "") sexos.add(valor.trim());
        }
        sexos.forEach(s => {
            selSexo.innerHTML += `<option value="${s}">${s}</option>`;
        });
    }

    // Filtro de Cidade
    const idxCidade = headers.findIndex(h => String(h).toLowerCase().includes("cidade"));
    const selCidade = document.getElementById("filtroCidade");
    selCidade.innerHTML = '<option value="">Todas as cidades</option>';

    if (idxCidade !== -1) {
        const cidades = new Set();
        for (let i = 1; i < todosDados.length; i++) {
            const valor = todosDados[i][idxCidade];
            if (valor && valor.trim() !== "") cidades.add(valor.trim());
        }
        cidades.forEach(c => {
            selCidade.innerHTML += `<option value="${c}">${c}</option>`;
        });
    }
}

// Mostrar tabela completa
function mostrarTabela(dadosMostrar) {
    let html = "<tr>";
    headers.forEach(col => {
        html += `<th>${col}</th>`;
    });
    html += "</tr>";

    for (let i = 1; i < dadosMostrar.length; i++) {
        html += "<tr>";
        dadosMostrar[i].forEach(cel => {
            html += `<td>${cel || ''}</td>`;
        });
        html += "</tr>";
    }
    document.getElementById("tabela").innerHTML = html;
}

// Filtro de busca
function aplicarFiltro() {
    const busca = document.getElementById("busca").value.toLowerCase().trim();
    const filtrado = [todosDados[0]];

    for (let i = 1; i < todosDados.length; i++) {
        if (todosDados[i].join(" ").toLowerCase().includes(busca)) {
            filtrado.push(todosDados[i]);
        }
    }
    mostrarTabela(filtrado);
}

function limparFiltros() {
    document.getElementById("busca").value = "";
    aplicarFiltro();
}

function imprimir() {
    const win = window.open('', '', 'width=1200,height=800');
    win.document.write(`
        <html><head><title>Relatório de Inscrições</title>
        <style>
            body {font-family:Arial;padding:30px;}
            h1 {text-align:center; color:#333;}
            table {width:100%; border-collapse:collapse;}
            th, td {border:1px solid #999; padding:8px; text-align:left;}
            th {background:#333; color:white;}
        </style>
        </head><body>
        <h1>Relatório de Inscrições - 1º Acampamento de Servos</h1>
        <table>${document.getElementById("tabela").innerHTML}</table>
        </body></html>
    `);
    win.document.close();
    win.print();
}

// Eventos
document.getElementById("busca").addEventListener("input", aplicarFiltro);

// Carregar dados ao abrir a página
window.onload = carregarDados;
</script>
</body>
</html>
