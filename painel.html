<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Painel de Cadastros - 1º Acampamento de Servos</title>
    <style>
        /* Estilo para a tela de login */
        #login-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #0a0a0a;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        /* Esconde o conteúdo principal antes do login */
        #conteudo-principal { display: none; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0a0a0a;
            color: #e2e8f0;
            margin: 0;
            padding: 20px;
            font-size: 16px;
        }
        h1 {
            color: #facc15;
            text-align: center;
            margin-bottom: 25px;
            font-size: 2.2em;
        }
        .topo {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 25px;
            justify-content: center;
            align-items: center;
        }
        input[type="text"], input[type="password"], select {
            padding: 12px 16px;
            border-radius: 8px;
            border: none;
            background: #1f1f1f;
            color: white;
            font-size: 1rem;
            min-width: 200px;
        }
        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: 0.3s;
        }
        button:hover { opacity: 0.8; }
        .btn-limpar { background: #4b5563; color: white; }
        .btn-atualizar { background: #22c55e; color: black; }
        .btn-relatorio { background: #eab308; color: black; }
        .btn-login { background: #facc15; color: black; margin-top: 10px; }

        .tabela-container { overflow-x: auto; }
        table {
            width: 100%;
            border-collapse: collapse;
            background: #1a1a1a;
            margin-top: 10px;
        }
        th, td {
            border: 1px solid #444;
            padding: 14px 12px;
            text-align: left;
            white-space: nowrap;
            font-size: 14px;
        }
        th {
            background: #2a2a2a;
            color: #facc15;
            position: sticky;
            top: 0;
            z-index: 10;
            font-size: 15px;
            font-weight: bold;
        }
        tr:nth-child(even) { background: #222; }
        tr:hover { background: #333; }
    </style>
</head>
<body>

<div id="login-screen">
    <h1>Acesso Restrito</h1>
    <input type="password" id="senhaInput" placeholder="Digite a senha...">
    <button class="btn-login" onclick="verificarSenha()">Entrar no Painel</button>
</div>

<div id="conteudo-principal">
    <h1>Painel de Cadastros - 1º Acampamento de Servos</h1>

    <div class="topo">
        <input type="text" id="busca" placeholder=" Busca geral...">
        <select id="filtroSexo" onchange="aplicarFiltro()">
            <option value="">Todos os sexos</option>
        </select>
        <select id="filtroCidade" onchange="aplicarFiltro()">
            <option value="">Todas as cidades</option>
        </select>
        <button class="btn-limpar" onclick="limparFiltros()"> Limpar</button>
        <button class="btn-atualizar" onclick="carregarDados()"> Atualizar</button>
        <button class="btn-relatorio" onclick="imprimir()"> Relatório</button>
    </div>

    <div class="tabela-container">
        <table id="tabela"></table>
    </div>
</div>

<script>
// CONFIGURAÇÃO
const URL = "https://script.google.com/macros/s/AKfycbyoYf4jnMG1-TCVK4ynfzwSBnBXQpJTlRvJL7GKDnjsWkQVGiPzCqTzdmlTD2PHXCqy/exec";
const SENHA_CORRETA = "123";

let todosDados = [];
let headers = [];

// Função de Login
function verificarSenha() {
    const senhaDigitada = document.getElementById("senhaInput").value;
    if (senhaDigitada === SENHA_CORRETA) {
        document.getElementById("login-screen").style.display = "none";
        document.getElementById("conteudo-principal").style.display = "block";
        carregarDados(); // Carrega os dados só após o login
    } else {
        alert("Senha incorreta!");
    }
}

// Permitir apertar "Enter" para logar
document.getElementById("senhaInput").addEventListener("keypress", function(e) {
    if (e.key === "Enter") verificarSenha();
});

// Carregar dados da planilha
function carregarDados() {
    fetch(URL)
        .then(res => res.text())
        .then(texto => {
            if (!texto || texto.trim() === "") {
                alert("Nenhum dado encontrado na planilha.");
                return;
            }

            const linhas = texto.trim().split("\n");
            todosDados = linhas.map(l => l.split("\t"));
            headers = todosDados[0] || [];

            popularFiltros();
            mostrarTabela(todosDados);
        })
        .catch(err => {
            console.error(err);
            alert("Erro ao carregar os dados. Verifique a conexão e se a planilha está pública.");
        });
}

// Popular filtros de Sexo e Cidade
function popularFiltros() {
    // Encontrar índice exato da coluna "Sexo" (evitando conflito com telefone)
    const idxSexo = headers.findIndex(h => h.trim().toLowerCase() === "sexo");
    const idxCidade = headers.findIndex(h => h.trim().toLowerCase().includes("cidade"));

    const selSexo = document.getElementById("filtroSexo");
    const selCidade = document.getElementById("filtroCidade");

    // Limpa e reseta
    selSexo.innerHTML = '<option value="">Todos os sexos</option>';
    selCidade.innerHTML = '<option value="">Todas as cidades</option>';

    const sexos = new Set();
    const cidades = new Set();

    for (let i = 1; i < todosDados.length; i++) {
        if (idxSexo !== -1) {
            let s = todosDados[i][idxSexo];
            if (s && s.trim() !== "") sexos.add(s.trim());
        }
        if (idxCidade !== -1) {
            let c = todosDados[i][idxCidade];
            if (c && c.trim() !== "") cidades.add(c.trim());
        }
    }

    sexos.forEach(s => selSexo.innerHTML += `<option value="${s}">${s}</option>`);
    cidades.forEach(c => selCidade.innerHTML += `<option value="${c}">${c}</option>`);
}

// Mostrar tabela
function mostrarTabela(dadosMostrar) {
    if (dadosMostrar.length === 0) {
        document.getElementById("tabela").innerHTML = "<tr><td>Nenhum resultado encontrado.</td></tr>";
        return;
    }

    let html = "<tr>";
    headers.forEach(col => html += `<th>${col}</th>`);
    html += "</tr>";

    for (let i = 1; i < dadosMostrar.length; i++) {
        html += "<tr>";
        dadosMostrar[i].forEach(cel => html += `<td>${cel || ''}</td>`);
        html += "</tr>";
    }
    document.getElementById("tabela").innerHTML = html;
}

// Lógica de Filtros Combinados
function aplicarFiltro() {
    const busca = document.getElementById("busca").value.toLowerCase().trim();
    const sexoFiltro = document.getElementById("filtroSexo").value;
    const cidadeFiltro = document.getElementById("filtroCidade").value;

    const idxSexo = headers.findIndex(h => h.trim().toLowerCase() === "sexo");
    const idxCidade = headers.findIndex(h => h.trim().toLowerCase().includes("cidade"));

    const filtrado = [headers];

    for (let i = 1; i < todosDados.length; i++) {
        const linha = todosDados[i];
        const textoLinha = linha.join(" ").toLowerCase();
        
        const bateBusca = textoLinha.includes(busca);
        const bateSexo = sexoFiltro === "" || linha[idxSexo] === sexoFiltro;
        const bateCidade = cidadeFiltro === "" || linha[idxCidade] === cidadeFiltro;

        if (bateBusca && bateSexo && bateCidade) {
            filtrado.push(linha);
        }
    }
    mostrarTabela(filtrado);
}

function limparFiltros() {
    document.getElementById("busca").value = "";
    document.getElementById("filtroSexo").value = "";
    document.getElementById("filtroCidade").value = "";
    mostrarTabela(todosDados);
}

function imprimir() {
    const conteudoTabela = document.getElementById("tabela").innerHTML;
    const dataAtual = new Date().toLocaleDateString('pt-BR');
    const win = window.open('', '', 'width=1400,height=900,scrollbars=yes');
    win.document.write(`
        <!DOCTYPE html>
        <html lang="pt-BR">
        <head>
            <meta charset="UTF-8">
            <title>Relatório de Inscrições - 1º Acampamento de Servos</title>
            <style>
                @page {
                    size: A4 landscape;
                    margin: 15mm;
                }
                
                * {
                    margin: 0;
                    padding: 0;
                    box-sizing: border-box;
                }
                
                body {
                    font-family: 'Segoe UI', Arial, sans-serif;
                    background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%);
                    color: #e2e8f0;
                    padding: 30px;
                    min-height: 100vh;
                }
                
                .cabecalho {
                    text-align: center;
                    margin-bottom: 40px;
                    padding: 30px 0;
                    border-bottom: 3px solid #facc15;
                }
                
                .cabecalho h1 {
                    color: #facc15;
                    font-size: 2.8em;
                    margin-bottom: 15px;
                    text-shadow: 0 4px 15px rgba(250, 204, 21, 0.3);
                }
                
                .cabecalho .subtitulo {
                    color: #94a3b8;
                    font-size: 1.4em;
                    margin-bottom: 10px;
                }
                
                .cabecalho .data {
                    color: #64748b;
                    font-size: 1.1em;
                }
                
                .tabela-container {
                    background: #1e2937;
                    border-radius: 16px;
                    padding: 25px;
                    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
                    border: 1px solid #334155;
                    overflow-x: auto;
                }
                
                table {
                    width: 100%;
                    border-collapse: collapse;
                    font-size: 13px;
                }
                
                th {
                    background: #2a2a2a;
                    color: #facc15;
                    padding: 15px 12px;
                    text-align: left;
                    font-weight: bold;
                    font-size: 14px;
                    text-transform: uppercase;
                    letter-spacing: 0.5px;
                    border: 1px solid #334155;
                }
                
                td {
                    padding: 12px 10px;
                    border: 1px solid #334155;
                    vertical-align: middle;
                }
                
                tr:nth-child(even) {
                    background: #222;
                }
                
                tr:hover {
                    background: #333;
                }
                
                .rodape {
                    text-align: center;
                    margin-top: 40px;
                    padding: 20px;
                    color: #64748b;
                    font-size: 0.9em;
                    border-top: 1px solid #334155;
                }
                
                @media print {
                    body {
                        background: white;
                        color: black;
                        padding: 20px;
                    }
                    
                    .cabecalho h1 {
                        color: #2563eb;
                        text-shadow: none;
                    }
                    
                    .cabecalho .subtitulo {
                        color: #374151;
                    }
                    
                    .tabela-container {
                        background: white;
                        box-shadow: none;
                        border: 1px solid #ccc;
                    }
                    
                    th {
                        background: #f3f4f6;
                        color: #111827;
                        border: 1px solid #ccc;
                    }
                    
                    td {
                        border: 1px solid #ccc;
                    }
                    
                    tr:nth-child(even) {
                        background: #f9fafb;
                    }
                    
                    tr:hover {
                        background: #f3f4f6;
                    }
                    
                    .rodape {
                        display: none;
                    }
                }
            </style>
        </head>
        <body>
            <div class="cabecalho">
                <h1> 1º Acampamento de Servos</h1>
                <div class="subtitulo">Relatório de Inscrições</div>
                <div class="data">Gerado em: ${dataAtual}</div>
            </div>
            
            <div class="tabela-container">
                <table>${conteudoTabela}</table>
            </div>
            
            <div class="rodape">
                <p>Relatório gerado automaticamente pelo Sistema de Cadastros</p>
                <p>Que Deus abençoe grandemente a vida de cada participante </p>
            </div>
        </body>
        </html>
    `);
    win.document.close();
}

// Evento de busca em tempo real
document.getElementById("busca").addEventListener("input", aplicarFiltro);

</script>
</body>
</html>
